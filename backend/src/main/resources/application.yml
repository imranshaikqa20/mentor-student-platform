server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/mentor_db
    username: postgres
    password: xxxxxxxx
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: update   # ✅ auto create tables
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  sql:
    init:
      mode: always   # ✅ ensures schema init if needed

  jackson:
    serialization:
      fail-on-empty-beans: false

jwt:
  secret: xxxxxxx
  expiration: 86400000

cors:
  allowed-origins:
    - http://localhost:3000
  allowed-methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS
  allowed-headers:
    - "*"

logging:
  level:
    org.springframework: INFO
    com.project: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
